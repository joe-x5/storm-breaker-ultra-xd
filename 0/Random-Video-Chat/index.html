<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Random Video Chat 🎥🤣</title>

    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/709/709682.png" type="image/png">

    <!-- Face Detection -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/1.3.0/face-api.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
        }
        #video-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        video {
            width: 45%;
            max-width: 400px;
            border: 3px solid white;
            border-radius: 10px;
        }
        button {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.1em;
        }
        button:hover {
            background-color: #ff9800;
        }
    </style>
</head>
<body>

    <h1>🎥 Random Video Chat - Funny Filters! 😂</h1>
    <button id="startCall">🔀 Find a Random Stranger</button>
    
    <div id="video-container">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        async function startVideo() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById("localVideo").srcObject = stream;
        }

        async function requestCameraAccess() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                console.log("Camera & Microphone Access Granted");
            } catch (error) {
                alert("⚠️ Please allow camera & microphone access for video chat!");
                console.error("Camera Access Denied:", error);
            }
        }

        document.getElementById("startCall").addEventListener("click", startVideo);

        // Run permission request on page load
        window.onload = requestCameraAccess;
    </script>

</body>
</html>
