<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Funny Camera Face Mask 🎭😂</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/1.3.0/face-api.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
        }
        video, canvas {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 50px;
            max-width: 100%;
        }
        button {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.1em;
        }
        button:hover {
            background-color: #ff9800;
        }
    </style>
</head>
<body>

    <h1>Funny Camera Face Mask 🎭🤣</h1>
    <button id="changeMask">🎭 Change Mask</button>
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const masks = [
            "https://i.imgur.com/1Nc5Gqz.png", // Funny Clown Mask
            "https://i.imgur.com/NV3h5Jn.png", // Cool Glasses
            "https://i.imgur.com/5XWkoRk.png", // Fake Beard
            "https://i.imgur.com/V8r8WAG.png"  // Funny Hat
        ];
        let currentMask = 0;
        let maskImg = new Image();
        maskImg.src = masks[currentMask];

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            await video.play();
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            detectFace();
        }

        async function detectFace() {
            await faceapi.nets.tinyFaceDetector.loadFromUri("https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js/models");
            await faceapi.nets.faceLandmark68Net.loadFromUri("https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js/models");

            setInterval(async () => {
                const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                if (detections) {
                    const { x, y, width, height } = detections.detection.box;
                    ctx.drawImage(maskImg, x - 20, y - 30, width + 40, height + 40);
                }
            }, 100);
        }

        document.getElementById("changeMask").addEventListener("click", () => {
            currentMask = (currentMask + 1) % masks.length;
            maskImg.src = masks[currentMask];
        });

        startCamera();
    </script>

</body>
</html>
