<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Love Checker ❤️</title>

    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/833/833472.png" type="image/png">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
            font-size: 2.5em;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background-color: white;
            color: black;
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2);
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border: 2px solid #ff4081;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.1em;
        }
        button:hover {
            background-color: #e91e63;
        }
        #result {
            font-size: 1.5em;
            margin-top: 15px;
        }
        #shareLink {
            margin-top: 15px;
            word-wrap: break-word;
            font-size: 0.9em;
            background: #f8f8f8;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>💖 Love Checker 💘</h1>
    <p>Enter your name and your love's name to check your love percentage!</p>

    <div class="container">
        <input type="text" id="yourName" placeholder="Your Name" required>
        <input type="text" id="loveName" placeholder="Crush's Name" required>
        <button onclick="calculateLove()">💑 Check Love</button>
        
        <p id="result"></p>
        
        <div id="shareLink"></div>
    </div>

    <script>
        function getRandomPercentage() {
            return Math.floor(Math.random() * 101); // 0 - 100%
        }

        function getLoveMessage(percentage) {
            if (percentage > 90) return "🔥 True Love! Soulmates! ❤️";
            if (percentage > 70) return "😍 A match made in heaven!";
            if (percentage > 50) return "😊 You two have a great connection!";
            if (percentage > 30) return "😅 Hmm... Maybe try flirting more?";
            return "💔 Ouch... Looks like it's just friendship!";
        }

        function calculateLove() {
            const yourName = document.getElementById("yourName").value.trim();
            const loveName = document.getElementById("loveName").value.trim();

            if (yourName === "" || loveName === "") {
                alert("Please enter both names!");
                return;
            }

            const lovePercentage = getRandomPercentage();
            const loveMessage = getLoveMessage(lovePercentage);

            document.getElementById("result").innerHTML = `❤️ ${yourName} + ${loveName} = ${lovePercentage}% Love! <br> ${loveMessage}`;

            generateShareLink(yourName, loveName, lovePercentage);
        }

        function generateShareLink(yourName, loveName, percentage) {
            const url = `${window.location.origin}${window.location.pathname}?yourName=${encodeURIComponent(yourName)}&loveName=${encodeURIComponent(loveName)}&percent=${percentage}`;
            document.getElementById("shareLink").innerHTML = `🔗 Share your result: <br><a href="${url}" target="_blank">${url}</a>`;
            document.getElementById("shareLink").style.display = "block";
        }

        function loadFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const yourName = urlParams.get("yourName");
            const loveName = urlParams.get("loveName");
            const percentage = urlParams.get("percent");

            if (yourName && loveName && percentage) {
                document.getElementById("result").innerHTML = `❤️ ${yourName} + ${loveName} = ${percentage}% Love! <br> ${getLoveMessage(percentage)}`;
                generateShareLink(yourName, loveName, percentage);
            }
        }

        window.onload = loadFromURL;
    </script>




<script>
document.addEventListener("DOMContentLoaded", () => {
  function showKaiAd() {
    getKaiAd({
      publisher: "58d21092-87f8-47c3-883d-fcd67eb318d8",
      app: "ai_img",
      slot: "ai_img",
      onerror: err => console.log("KaiAds Error:", err),
      onready: ad => ad.call("display")
    });
  }

  showKaiAd();
  setInterval(showKaiAd, 120000);
});
</script>

</body>
</html>
