<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Funny Voice Bubble Game 🎤🎈</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222;
            color: white;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #bubble {
            width: 50px;
            height: 50px;
            background-color: rgb(255, 100, 150);
            border-radius: 50%;
            position: absolute;
            transition: all 0.1s ease-in-out;
            box-shadow: 0 0 10px rgba(255, 100, 150, 0.5);
        }
        button {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.1em;
        }
        button:hover {
            background-color: #ff9800;
        }
    </style>
</head>
<body>

    <h1>Funny Voice Bubble Game 🎤🎈</h1>
    <p>**Shout, sing, or talk loudly** to make the bubble grow! But don't make it too big or it'll pop! 💥</p>
    
    <button id="startGame">🎤 Start Game</button>
    
    <div id="game-container">
        <div id="bubble"></div>
    </div>

    <script>
        let bubble = document.getElementById("bubble");
        let startGameBtn = document.getElementById("startGame");
        let bubbleSize = 50; // Initial bubble size
        let maxBubbleSize = 300; // Max before it pops
        let minBubbleSize = 50; // Smallest size
        let popSound = new Audio("https://www.fesliyanstudios.com/play-mp3/438"); // Funny pop sound
        let isListening = false;

        startGameBtn.addEventListener("click", () => {
            startGame();
        });

        function startGame() {
            if (isListening) return;
            isListening = true;
            startGameBtn.innerText = "🎤 Talking... Keep Going!";
            startGameBtn.disabled = true;

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    let audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    let analyser = audioContext.createAnalyser();
                    let microphone = audioContext.createMediaStreamSource(stream);
                    microphone.connect(analyser);
                    analyser.fftSize = 256;
                    
                    let bufferLength = analyser.frequencyBinCount;
                    let dataArray = new Uint8Array(bufferLength);

                    function animateBubble() {
                        analyser.getByteFrequencyData(dataArray);
                        let volume = dataArray.reduce((a, b) => a + b) / bufferLength;

                        if (volume > 50) {
                            bubbleSize += volume / 5;
                        } else {
                            bubbleSize -= 2;
                        }

                        if (bubbleSize > maxBubbleSize) {
                            popBubble();
                        } else if (bubbleSize < minBubbleSize) {
                            bubbleSize = minBubbleSize;
                        }

                        bubble.style.width = bubbleSize + "px";
                        bubble.style.height = bubbleSize + "px";
                        requestAnimationFrame(animateBubble);
                    }

                    animateBubble();
                })
                .catch(error => {
                    alert("Microphone access is required to play!");
                    console.error(error);
                });
        }

        function popBubble() {
            popSound.play();
            bubble.style.backgroundColor = "transparent";
            bubble.style.boxShadow = "none";
            startGameBtn.innerText = "😆 You Popped the Bubble! Try Again";
            startGameBtn.disabled = false;
            isListening = false;
            bubbleSize = 50;
            setTimeout(() => {
                bubble.style.backgroundColor = "rgb(255, 100, 150)";
                bubble.style.boxShadow = "0 0 10px rgba(255, 100, 150, 0.5)";
            }, 1000);
        }
    </script>

</body>
</html>
