<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crazy Clicker: The Rage Quit Challenge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ffcc00;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
            font-size: 2em;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 60vh;
            overflow: hidden;
        }
        .click-button {
            position: absolute;
            background-color: red;
            color: white;
            border: none;
            font-size: 1.5em;
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease-in-out;
        }
        #score {
            font-size: 1.5em;
            margin-top: 20px;
        }
        #start-button {
            font-size: 1.2em;
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Crazy Clicker: The Rage Quit Challenge! 🤪</h1>
    <p>Click the moving button as many times as you can in 30 seconds!</p>
    <button id="start-button">Start Game</button>
    <div id="game-container">
        <button class="click-button" id="crazyButton" style="display: none;">Click Me!</button>
    </div>
    <p id="score">Score: 0</p>

    <script>
        let score = 0;
        let gameActive = false;
        let timer;

        const button = document.getElementById("crazyButton");
        const scoreDisplay = document.getElementById("score");
        const startButton = document.getElementById("start-button");
        const gameContainer = document.getElementById("game-container");

        function moveButton() {
            if (!gameActive) return;

            const maxX = gameContainer.clientWidth - button.clientWidth;
            const maxY = gameContainer.clientHeight - button.clientHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            button.style.left = randomX + "px";
            button.style.top = randomY + "px";

            button.style.transform = `rotate(${Math.floor(Math.random() * 360)}deg) scale(${Math.random() * 1.5 + 0.5})`;
        }

        button.addEventListener("click", () => {
            if (gameActive) {
                score++;
                scoreDisplay.textContent = "Score: " + score;
                moveButton();
            }
        });

        startButton.addEventListener("click", () => {
            score = 0;
            scoreDisplay.textContent = "Score: 0";
            gameActive = true;
            button.style.display = "block";
            moveButton();

            timer = setTimeout(() => {
                gameActive = false;
                button.style.display = "none";
                showFinalMessage();
            }, 30000); // 30 seconds
        });

        function showFinalMessage() {
            let message = "";
            if (score < 5) {
                message = "😂 Are you even trying?";
            } else if (score < 15) {
                message = "😆 Not bad, but could be better!";
            } else if (score < 30) {
                message = "🔥 You got skills!";
            } else {
                message = "🤯 Are you a robot?!";
            }
            alert("Game Over! Your Score: " + score + "\n" + message);
        }
    </script>

</body>
</html>
