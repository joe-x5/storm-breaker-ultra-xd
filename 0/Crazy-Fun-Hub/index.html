<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crazy Fun Hub 🎭🎤📍</title>

    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1682/1682521.png" type="image/png">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 2em;
        }
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .game-box {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
        }
        video, canvas {
            border-radius: 10px;
            width: 100%;
            max-width: 250px;
        }
        button {
            background: #ff4081;
            color: white;
            padding: 10px;
            font-size: 1em;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
        button:hover {
            background: #e91e63;
        }
    </style>
</head>
<body>

    <h1>🎭🎤📍 Crazy Fun Hub</h1>
    <p>The ultimate funny game hub - Voice, Camera, and Location Fun!</p>

    <div class="game-container">

        <!-- Funny Voice Changer -->
        <div class="game-box">
            <h2>🎤 Funny Voice</h2>
            <button onclick="startVoiceChanger()">🎙️ Start Talking</button>
            <audio id="audio" controls></audio>
        </div>

        <!-- Funny Face Warp -->
        <div class="game-box">
            <h2>📷 Funny Camera</h2>
            <video id="video" autoplay></video>
            <canvas id="canvas"></canvas>
            <button onclick="takeFunnyPicture()">📸 Take Funny Photo</button>
        </div>

        <!-- Fake Location -->
        <div class="game-box">
            <h2>📍 Fake Location</h2>
            <p id="location">Fetching location...</p>
            <button onclick="getFakeLocation()">🔄 Change Location</button>
        </div>

    </div>

    <script>
        // 🎤 Voice Changer (Funny Mic)
        async function startVoiceChanger() {
            const audio = document.getElementById("audio");
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            let audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
                const audioUrl = URL.createObjectURL(audioBlob);
                audio.src = audioUrl;
                audioChunks = [];
            };

            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 3000);
        }

        // 📷 Funny Face Warp (Live Camera)
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => video.srcObject = stream)
            .catch(err => console.error("Camera access denied:", err));

        function takeFunnyPicture() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Apply funny face effect
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                data[i] = data[i + 50] || data[i]; // Warp effect
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // 📍 Fake Location Generator
        function getFakeLocation() {
            const locations = [
                "Antarctica 🧊", "Underwater 🌊", "Mars 🚀", "Haunted House 👻",
                "Jungle 🌴", "Mount Everest 🏔️", "Secret Government Base 🕵️"
            ];
            document.getElementById("location").innerText = 
                "You are in: " + locations[Math.floor(Math.random() * locations.length)];
        }

        getFakeLocation(); // Set initial fake location

    </script>

</body>
</html>
