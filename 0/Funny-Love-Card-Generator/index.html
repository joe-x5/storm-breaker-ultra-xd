<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Funny Love Card Generator 💌🤣</title>

    <!-- Favicon -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2285/2285611.png" type="image/png">

    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            background-color: pink;
            color: white;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
            font-size: 2em;
        }
        #card {
            width: 80%;
            max-width: 400px;
            background-color: white;
            color: black;
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        #card img {
            width: 100%;
            border-radius: 10px;
        }
        #message {
            font-size: 1.2em;
            margin-top: 10px;
        }
        #name {
            font-size: 1.5em;
            font-weight: bold;
            color: red;
        }
        button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.1em;
        }
        button:hover {
            background-color: #e91e63;
        }
    </style>
</head>
<body>

    <h1>💌 Funny Love Card Generator 😍🤣</h1>
    <p>Enter your love's name and create a funny love card!</p>

    <input type="text" id="loverName" placeholder="Enter Name" style="padding: 8px; font-size: 1em;">
    <button onclick="generateCard()">💖 Create Love Card</button>

    <div id="card" style="display: none;">
        <img id="loveImage" src="https://source.unsplash.com/400x300/?love,funny" alt="Love Image">
        <p id="message"></p>
        <p>💖 With Love, <span id="name"></span> 💖</p>
        <button onclick="downloadCard()">📩 Download</button>
    </div>

    <script>
        const funnyMessages = [
            "You are my WiFi... I get lost without you! 📶💕",
            "Are you French? Because Eiffel for you! 😍",
            "You must be a magician because whenever I look at you, everyone else disappears! 🎩✨",
            "Our love is like a fart... Silent but deadly! 💨😂",
            "You are like my favorite pizza—hot, cheesy, and irresistibly delicious! 🍕💖",
            "Are you a Google search? Because you have everything I’ve been looking for! 🔎❤️",
            "If love was a crime, we’d both be serving life sentences! 🚔💕",
            "You are my password... Without you, I am locked out of happiness! 🔑💞",
            "Are you a banana? Because I find you a-peel-ing! 🍌😂",
            "You're my favorite notification! 📱💘"
        ];

        function generateCard() {
            const loverName = document.getElementById("loverName").value;
            if (loverName.trim() === "") {
                alert("Please enter a name!");
                return;
            }

            const randomMessage = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
            document.getElementById("message").innerText = randomMessage;
            document.getElementById("name").innerText = loverName;
            document.getElementById("loveImage").src = `https://source.unsplash.com/400x300/?love,funny,cute,${Math.random()}`;
            document.getElementById("card").style.display = "block";
        }

        function downloadCard() {
            alert("📩 Screenshot and Save the Card! (Auto-download coming soon!)");
        }
    </script>

</body>
</html>
